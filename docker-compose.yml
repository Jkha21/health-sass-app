services:
  # ========== KAFKA STACK ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092   # Use 'kafka:9092' for inter‑container
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - health-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - health-network

  # ========== YOUR EXISTING SERVICES (with KAFKA_BROKERS added) ==========
  patient-service:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "4001:4001"
    env_file: .env
    environment:
      - PORT=4001
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/app/node_modules/.install-complete"]
      interval: 10s
      timeout: 10s
      retries: 30
    command: sh -c "npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && touch /app/node_modules/.install-complete && npx turbo run dev --filter=patient-service"
    networks:
      - health-network

  telehealth-service:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "4002:4002"
    env_file: .env
    environment:
      - PORT=4002
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      patient-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: sh -c "npx turbo run dev --filter=telehealth-service"
    networks:
      - health-network

  billing-service:
